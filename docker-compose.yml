version: "3.8"
services:
  db:
    image: postgres:15
    container_name: fit4110-db-lab05
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fit4110}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fit4110_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fit4110}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - team-internal

  ai-service:
    build:
      context: .
      dockerfile: src/ai_service/Dockerfile
    image: fit4110/ai-service:${SERVICE_VERSION:-v0.1.0-team-iot}
    container_name: fit4110-ai-lab05
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - team-internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fit4110/api:${SERVICE_VERSION:-v0.1.0-team-iot}
    container_name: fit4110-api-lab05
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - team-internal
      - class-net

volumes:
  pgdata:

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true
